<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生ロードマップ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f7f5f2; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
.wrap { width: 100%; max-width: 480px; }
.rm-title { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 1.5rem; }
.rm-block { margin-bottom: 1.25rem; }
.rm-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 0.4rem; display: block; letter-spacing: 0.03em; }
textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fff; resize: none; line-height: 1.6; }
textarea:focus { outline: none; border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
.rm-btn { width: 100%; padding: 0.85rem; border-radius: 8px; border: none; background: #1D9E75; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 0.5rem; transition: background 0.15s; }
.rm-btn:hover { background: #0F6E56; }
.rm-result { display: none; }
.rm-result.active { display: block; }
.rm-result-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
.rm-rb-block { padding: 1rem 1.1rem; border-bottom: 1px solid #f0f0f0; }
.rm-rb-block:last-child { border-bottom: none; }
.rm-rb-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 6px; text-transform: uppercase; }
.rm-rb-label.l1 { color: #0F6E56; }
.rm-rb-label.l2 { color: #534AB7; }
.rm-rb-label.l3 { color: #854F0B; }
.rm-rb-text { font-size: 14px; color: #1a1a1a; line-height: 1.75; white-space: pre-wrap; }
.rm-print-btn { width: 100%; padding: 0.75rem; border-radius: 8px; border: 1.5px solid #1D9E75; background: transparent; color: #0F6E56; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 0.75rem; }
.rm-print-btn:hover { background: #E1F5EE; }
.rm-edit-btn { width: 100%; padding: 0.65rem; border-radius: 8px; border: 1px solid #ccc; background: transparent; color: #666; font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 0.5rem; }
.rm-edit-btn:hover { background: #f5f5f5; }
@media print {
  body { background: #fff; padding: 0; }
  .rm-print-btn, .rm-edit-btn { display: none; }
  #formView { display: none !important; }
  .rm-result { display: block !important; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="rm-title">人生ロードマップ</div>

  <div id="formView">
    <div class="rm-block">
      <label class="rm-label">3年後に達成したいこと、望むもの</label>
      <textarea id="f_goal" rows="4" placeholder="仕事・お金・人間関係・生き方など、思いのまま書いてください"></textarea>
    </div>
    <div class="rm-block">
      <label class="rm-label">その理由</label>
      <textarea id="f_why" rows="4" placeholder="なぜそれを望むのか、深掘りしてみてください"></textarea>
    </div>
    <div class="rm-block">
      <label class="rm-label">それを手にした時、どんな気持ち？</label>
      <textarea id="f_feeling" rows="4" placeholder="目を閉じて、3年後の自分をイメージしてみてください"></textarea>
    </div>
    <button class="rm-btn" onclick="showResult()">完成させる</button>
  </div>

  <div class="rm-result" id="resultView">
    <div class="rm-result-card">
      <div class="rm-rb-block">
        <div class="rm-rb-label l1">3年後に達成したいこと・望むもの</div>
        <div class="rm-rb-text" id="r_goal"></div>
      </div>
      <div class="rm-rb-block">
        <div class="rm-rb-label l2">その理由</div>
        <div class="rm-rb-text" id="r_why"></div>
      </div>
      <div class="rm-rb-block">
        <div class="rm-rb-label l3">それを手にした時の気持ち</div>
        <div class="rm-rb-text" id="r_feeling"></div>
      </div>
    </div>
    <button class="rm-print-btn" onclick="window.print()">PDFとして保存する</button>
    <button class="rm-edit-btn" onclick="backToEdit()">修正する</button>
  </div>
</div>

<script>
function showResult() {
  const goal = document.getElementById('f_goal').value.trim();
  const why = document.getElementById('f_why').value.trim();
  const feeling = document.getElementById('f_feeling').value.trim();
  if (!goal && !why && !feeling) { alert('入力してから完成させてください'); return; }
  document.getElementById('r_goal').textContent = goal || '—';
  document.getElementById('r_why').textContent = why || '—';
  document.getElementById('r_feeling').textContent = feeling || '—';
  document.getElementById('formView').style.display = 'none';
  document.getElementById('resultView').classList.add('active');
  window.scrollTo(0, 0);
}
function backToEdit() {
  document.getElementById('resultView').classList.remove('active');
  document.getElementById('formView').style.display = '';
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
